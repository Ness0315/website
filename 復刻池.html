<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>復刻活動抽卡紀錄</title>
<style>
body { font-family: Arial, sans-serif; background-color: #F3E5F5; padding: 20px; }
h2 { text-align: center; }
input, select, button { margin: 5px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #999; padding: 5px; text-align: center; }
.夏彥 { color: #FFFF00; font-weight: bold; }
.左然 { color: #FF4500; font-weight: bold; }
.莫弈 { color: #32CD32; font-weight: bold; }
.陸景和 { color: #BA55D3; font-weight: bold; }
.warning { color: red; font-weight: bold; }
</style>
</head>
<body>
<h2>復刻活動抽卡紀錄</h2>

<!-- 新增活動 -->
<div>
<label>活動名稱: <input type="text" id="eventName" placeholder="輸入活動名稱"></label>
<label>SSR已抽次數: <input type="number" id="SSRDrawn" value="0" min="0"></label>
<label>SSS已抽次數: <input type="number" id="SSSDrawn" value="0" min="0"></label>
<button onclick="addEvent()">新增/更新活動</button>
</div>

<!-- 選擇活動 -->
<div>
<label>選擇活動:
<select id="eventSelect" onchange="loadEventData()">
<option value="">請選擇</option>
</select>
</label>
<button onclick="deleteEvent()">刪除活動</button>
</div>

<!-- 記錄抽卡 -->
<div>
<label>男主:
<select id="characterSelect">
<option value="夏彥">夏彥</option>
<option value="左然">左然</option>
<option value="莫弈">莫弈</option>
<option value="陸景和">陸景和</option>
</select>
</label>
<label>稀有度:
<select id="raritySelect">
<option value="SSR">SSR</option>
<option value="SSS">SSS</option>
</select>
</label>
<label>抽卡次數: <input type="number" id="drawCount" value="1" min="1"></label>
<label>活動卡: <input type="checkbox" id="isEventCard"></label>
<button onclick="addDraw()">記錄抽卡</button>
</div>

<!-- 匯出匯入資料 -->
<div>
<button onclick="exportData()">匯出資料</button>
<input type="file" id="importFile" accept=".json">
<button onclick="importData()">匯入資料</button>
</div>

<!-- 顯示紀錄 -->
<table id="recordTable">
<thead>
<tr>
<th>活動名稱</th>
<th>男主</th>
<th>稀有度</th>
<th>抽卡次數</th>
<th>SSR剩餘保底</th>
<th>SSS剩餘保底</th>
<th>操作</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
let events = JSON.parse(localStorage.getItem('eventsData') || '{}');
let records = JSON.parse(localStorage.getItem('drawRecords') || '[]');

function saveAll() {
localStorage.setItem('eventsData', JSON.stringify(events));
localStorage.setItem('drawRecords', JSON.stringify(records));
}

// 新增/更新活動
function addEvent() {
const name = document.getElementById('eventName').value.trim();
if(!name){ alert('請輸入活動名稱'); return; }

const SSRDrawn = parseInt(document.getElementById('SSRDrawn').value) || 0;
const SSSDrawn = parseInt(document.getElementById('SSSDrawn').value) || 0;

if(events[name]){
events[name].SSRDrawn = SSRDrawn;
events[name].SSSDrawn = SSSDrawn;
} else {
events[name] = { SSRBase:100, SSRDrawn:SSRDrawn, SSSBase:100, SSSDrawn:SSSDrawn };
}

saveAll();
updateEventSelect();
document.getElementById('eventName').value='';
document.getElementById('SSRDrawn').value='0';
document.getElementById('SSSDrawn').value='0';
}

// 更新活動選單
function updateEventSelect() {
const select = document.getElementById('eventSelect');
select.innerHTML = '<option value="">請選擇</option>';
for(let e in events){
let opt = document.createElement('option');
opt.value = e;
opt.textContent = e;
select.appendChild(opt);
}
}

// 刪除活動
function deleteEvent() {
const select = document.getElementById('eventSelect');
const eventName = select.value;
if(!eventName){ alert('請先選擇活動'); return; }
if(confirm(`確定刪除活動 ${eventName} 及所有紀錄嗎？`)){
delete events[eventName];
records = records.filter(r => r.event !== eventName);
saveAll();
updateEventSelect();
loadEventData();
}
}

// 記錄抽卡
function addDraw() {
const eventName = document.getElementById('eventSelect').value;
if(!eventName){ alert('請先選擇活動'); return; }
const char = document.getElementById('characterSelect').value;
const rarity = document.getElementById('raritySelect').value;
const count = parseInt(document.getElementById('drawCount').value);
const isEventCard = document.getElementById('isEventCard').checked;

const eventData = events[eventName];

let preSSR = eventData.SSRDrawn;
let preSSS = eventData.SSSDrawn;

// 更新累計抽數
if(rarity==='SSR'){
if(isEventCard) eventData.SSRDrawn = 0;
else eventData.SSRDrawn += count;
} else {
if(isEventCard) eventData.SSSDrawn = 0;
else eventData.SSSDrawn += count;
}

// 計算保底剩餘
const SSRRemaining = (rarity==='SSR' && isEventCard) ? 100 : eventData.SSRBase - (preSSR + count) % eventData.SSRBase || eventData.SSRBase;
const SSSRemaining = (rarity==='SSS' && isEventCard) ? 100 : eventData.SSSBase - (preSSS + count) % eventData.SSSBase || eventData.SSSBase;

// 記錄抽卡
records.push({
event:eventName,
character:char,
rarity,
drawCount:count,
SSRRemaining,
SSSRemaining
});

saveAll();
loadEventData();
}

// 載入紀錄
function loadEventData() {
const tbody = document.querySelector('#recordTable tbody');
tbody.innerHTML = '';
records.forEach((r,i)=>{
const tr = document.createElement('tr');
const SSRClass = r.SSRRemaining <= 10 ? 'warning' : '';
const SSSClass = r.SSSRemaining <= 10 ? 'warning' : '';
tr.innerHTML = `
<td>${r.event}</td>
<td class="${r.character}">${r.character}</td>
<td>${r.rarity}</td>
<td>${r.drawCount}</td>
<td class="${SSRClass}">${r.SSRRemaining}</td>
<td class="${SSSClass}">${r.SSSRemaining}</td>
<td>
<button onclick="editRecord(${i})">編輯</button>
<button onclick="deleteRecord(${i})">刪除</button>
</td>
`;
tbody.appendChild(tr);
});
}

// 編輯紀錄
function editRecord(index){
const r = records[index];
const newCount = parseInt(prompt(`編輯 ${r.character} 抽卡次數`, r.drawCount));
if(!isNaN(newCount)){
const eventData = events[r.event];

// 先扣掉原紀錄的抽數影響
if(r.rarity==='SSR') eventData.SSRDrawn -= r.drawCount;
else eventData.SSSDrawn -= r.drawCount;

// 再加上新抽數
if(r.rarity==='SSR') eventData.SSRDrawn += newCount;
else eventData.SSSDrawn += newCount;

// 保底限制
if(eventData.SSRDrawn < 0) eventData.SSRDrawn = 0;
if(eventData.SSSDrawn < 0) eventData.SSSDrawn = 0;

// 更新紀錄
r.drawCount = newCount;
r.SSRRemaining = r.rarity==='SSR' ? eventData.SSRBase - (eventData.SSRDrawn % eventData.SSRBase || eventData.SSRBase) : r.SSRRemaining;
r.SSSRemaining = r.rarity==='SSS' ? eventData.SSSBase - (eventData.SSSDrawn % eventData.SSSBase || eventData.SSSBase) : r.SSSRemaining;

saveAll();
loadEventData();
}
}

// 刪除單筆紀錄
function deleteRecord(index){
const r = records[index];
const eventData = events[r.event];

if(r.rarity==='SSR') eventData.SSRDrawn -= r.drawCount;
else eventData.SSSDrawn -= r.drawCount;

if(eventData.SSRDrawn < 0) eventData.SSRDrawn = 0;
if(eventData.SSSDrawn < 0) eventData.SSSDrawn = 0;

records.splice(index,1);
saveAll();
loadEventData();
}

// 匯出資料
function exportData(){
const dataStr = JSON.stringify({events, records}, null, 2);
const blob = new Blob([dataStr], {type:"application/json"});
const a = document.createElement('a');
a.href = URL.createObjectURL(blob);
a.download = "抽卡紀錄.json";
a.click();
}

// 匯入資料
function importData(){
const fileInput = document.getElementById('importFile');
if(!fileInput.files.length){ alert('請選擇檔案'); return; }
const reader = new FileReader();
reader.onload = function(e){
try{
const imported = JSON.parse(e.target.result);
events = imported.events || {};
records = imported.records || [];
saveAll();
updateEventSelect();
loadEventData();
alert('匯入成功');
}catch(err){
alert('匯入失敗，檔案格式錯誤');
}
}
reader.readAsText(fileInput.files[0]);
}

// 初始化
updateEventSelect();
loadEventData();
</script>
</body>
</html>
