<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>未定事件簿抽卡紀錄</title>
<style>
/* ===== 動態夢幻紫粉光暈背景 + 飄動星塵 ===== */
body {
  font-family: Arial;
  color: white;
  padding: 20px;
  background: #1a0a2a;
  overflow: hidden;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: -50%; left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px) repeat;
  background-size: 40px 40px;
  animation: floatStars 80s linear infinite;
  opacity: 0.35;
  pointer-events: none;
  z-index: -1;
}
body::after {
  content: "";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(120deg, #6a0dad, #ff69b4, #c471f5, #ffb6c1, #6a0dad);
  background-size: 500% 500%;
  animation: gradientMove 25s ease infinite;
  opacity: 0.6;
  z-index: -2;
  pointer-events: none;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle 3s infinite alternate;
}
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes floatStars {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-25%, -25%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
@keyframes twinkle {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.5); }
}

/* ===== UI ===== */
h2 { text-align:center; margin-bottom: 15px; }
.container{
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:15px;
}
input,select,button{
  margin:5px;
  padding:6px;
  border-radius:8px;
  border:none;
}
button{
  background:#ff7aa2;
  color:white;
  cursor:pointer;
}
button:hover{ background:#ff4d88; }
table{
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
}
th,td{
  padding:10px;
  text-align:center;
}
.xia { color:#FFC107; font-weight:bold; }
.zuo { color:#E53935; font-weight:bold; }
.mo  { color:#43A047; font-weight:bold; }
.lu  { color:#BA68C8; font-weight:bold; }
.status { margin-top:10px; font-weight:bold; }

/* 篩選按鈕 */
.filter-btn {
  background:#6a0dad;
}
.filter-btn:hover {
  background:#ff69b4;
}
</style>
</head>
<body>
<h2>🎴 未定事件簿抽卡紀錄系統</h2>
<div class="container">

<!-- 新增篩選按鈕 -->
<div>
  <button class="filter-btn" onclick="filterRole('')">查看全部</button>
  <button class="filter-btn" onclick="filterRole('夏彥')">夏彥</button>
  <button class="filter-btn" onclick="filterRole('左然')">左然</button>
  <button class="filter-btn" onclick="filterRole('莫弈')">莫弈</button>
  <button class="filter-btn" onclick="filterRole('陸景和')">陸景和</button>
</div>

<button onclick="resetAll()">🔄 重置全部</button>
<div id="status" class="status"></div>

活動開始： <input type="date" id="start">
活動結束： <input type="date" id="end"><br>
角色： <select id="role">
  <option>夏彥</option>
  <option>左然</option>
  <option>莫弈</option>
  <option>陸景和</option>
</select>
卡池： <input id="pool">
卡片： <input id="card">
等級： <select id="rarity">
  <option>SSR</option>
  <option>SSS</option>
</select>
是否活動卡： <select id="eventSelect" onchange="toggleHitInput()">
  <option>否</option>
  <option>是</option>
</select>
已抽： <input type="number" id="count">
<span id="hitArea" style="display:none;">
  第幾抽中：<input type="number" id="hit">
</span>
<button onclick="addRecord()">新增</button>

<h3 id="pityDisplay"></h3>
<button onclick="exportData()">📤 匯出</button>
<input type="file" id="importFile" onchange="importData()">

<table>
<thead>
<tr>
  <th>活動區間</th>
  <th>角色</th>
  <th>卡池</th>
  <th>卡片</th>
  <th>等級</th>
  <th>抽數</th>
  <th>剩餘保底</th>
  <th>操作</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("gachaData")) || [];
let editIndex = -1;

function getColor(role){
  return {"夏彥":"xia","左然":"zuo","莫弈":"mo","陸景和":"lu"}[role];
}

function toggleHitInput(){
  hitArea.style.display = eventSelect.value==="是" ? "inline" : "none";
}

function recalcAll(){
  let pity = { SSR:100, SSS:100 };
  data.forEach(d=>{
    let remain = pity[d.rarity];
    if(d.event === "是"){
      let before = d.hit - 1;
      if(before>0){
        if(before>=remain){
          let extra = before - remain;
          remain = 100 - (extra%100);
        } else { remain -= before; }
      }
      pity[d.rarity] = 100;
      let after = d.count - d.hit;
      if(after>0) pity[d.rarity] -= after;
    } else {
      if(d.count>=remain){
        let extra = d.count - remain;
        pity[d.rarity] = 100 - (extra%100);
      } else { pity[d.rarity] = remain - d.count; }
    }
    d.remain = pity[d.rarity];
  });
  return pity;
}

function addRecord(){
  let d = {
    start: start.value,
    end: end.value,
    role: role.value,
    pool: pool.value,
    card: card.value,
    rarity: rarity.value,
    event: eventSelect.value,
    count: parseInt(count.value),
    hit: parseInt(hit.value) || 0
  };
  if(!d.count) return alert("請輸入抽數");
  if(d.event==="是"){
    if(!d.hit || d.hit>d.count) return alert("請正確填寫「第幾抽中」");
  }
  if(editIndex === -1){
    data.push(d);
  }else{
    data[editIndex] = d;
    editIndex = -1;
  }
  clearInput();
  save();
  render();
}

function edit(i){
  let d = data[i];
  start.value = d.start;
  end.value = d.end;
  role.value = d.role;
  pool.value = d.pool;
  card.value = d.card;
  rarity.value = d.rarity;
  eventSelect.value = d.event;
  count.value = d.count;
  hit.value = d.hit;
  toggleHitInput();
  editIndex = i;
}

function clearInput(){
  start.value=""; end.value=""; pool.value=""; card.value=""; count.value=""; hit.value="";
}

function render(filter=""){
  let pity = recalcAll();
  list.innerHTML = "";
  data.forEach((d,i)=>{
    if(filter && d.role!==filter) return; // 篩選角色
    list.innerHTML += `
      <tr>
        <td>${d.start} ~ ${d.end}</td>
        <td class="${getColor(d.role)}">${d.role}</td>
        <td>${d.pool}</td>
        <td>${d.card}</td>
        <td>${d.rarity}</td>
        <td>${d.count}</td>
        <td>${d.remain}</td>
        <td>
          <button onclick="edit(${i})">編輯</button>
          <button onclick="del(${i})">刪除</button>
        </td>
      </tr>`;
  });
  pityDisplay.innerHTML = `SSR剩餘：${pity.SSR} ｜ SSS剩餘：${pity.SSS}`;
  status.innerHTML = data.length===0 ? "🟢 全新紀錄" : "🟡 已正確計算保底";
}

function filterRole(roleName){
  render(roleName);
}

function del(i){
  if(confirm("確定刪除？")){
    data.splice(i,1);
    save();
    render();
  }
}

function save(){
  localStorage.setItem("gachaData",JSON.stringify(data));
}

function resetAll(){
  if(confirm("確定清除？")){
    localStorage.clear();
    location.reload();
  }
}

function exportData(){
  let blob = new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="gacha_backup.json";
  a.click();
}

function importData(){
  let file = importFile.files[0];
  if(!file) return;
  let reader=new FileReader();
  reader.onload=function(e){
    let imported = JSON.parse(e.target.result);
    let existing = new Set(data.map(d=>JSON.stringify(d)));
    imported.forEach(d=>{
      if(!existing.has(JSON.stringify(d))) data.push(d);
    });
    save();
    render();
    alert("✅ 匯入完成（自動合併）");
  };
  reader.readAsText(file);
}

/* 星星 */
for(let i=0;i<50;i++){
  let s = document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration= (2+Math.random()*3) + "s";
  document.body.appendChild(s);
}

render();
</script>
</body>
</html>
