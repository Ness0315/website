<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>未定事件簿抽卡紀錄</title>

<style>
body {
  font-family: Arial;
  background: #F3E5F5;
  padding: 20px;
}

h2 { text-align:center; }

input, select, button {
  margin: 5px;
  padding: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

/* 男主顏色 */
.xia { color:#FFC107; font-weight:bold; }
.zuo { color:#E53935; font-weight:bold; }
.mo  { color:#43A047; font-weight:bold; }
.lu  { color:#BA68C8; font-weight:bold; }

.status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🎴 未定事件簿抽卡紀錄系統</h2>

<button onclick="resetAll()">🔄 重置全部</button>

<div class="status" id="status"></div>

活動開始：
<input type="date" id="start">

活動結束：
<input type="date" id="end"><br>

角色：
<select id="role">
  <option>夏彥</option>
  <option>左然</option>
  <option>莫弈</option>
  <option>陸景和</option>
</select>

卡池名稱：
<input type="text" id="pool">

卡片名稱：
<input type="text" id="card">

等級：
<select id="rarity">
  <option>SSR</option>
  <option>SSS</option>
</select>

是否活動卡：
<select id="event">
  <option>是</option>
  <option>否</option>
</select>

已抽：
<input type="number" id="count">

<button onclick="addRecord()">新增</button>

<h3 id="pityDisplay"></h3>

<table>
<thead>
<tr>
<th>活動區間</th>
<th>角色</th>
<th>卡池</th>
<th>卡片</th>
<th>等級</th>
<th>抽數</th>
<th>剩餘保底</th>
<th>操作</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

<script>
// ===== 資料 =====
let data = JSON.parse(localStorage.getItem("gachaData")) || [];

// ===== 男主顏色 =====
function getColor(role){
  return {
    "夏彥":"xia",
    "左然":"zuo",
    "莫弈":"mo",
    "陸景和":"lu"
  }[role];
}

// ===== ⭐ 核心：重算全部保底 =====
function recalcAll(){
  let pity = { SSR: 100, SSS: 100 };

  data.forEach(d=>{
    let remain = pity[d.rarity];
    let count = d.count;

    if(count >= remain){
      count -= remain;
      let newRemain = 100 - (count % 100);
      pity[d.rarity] = newRemain === 100 ? 100 : newRemain;
    } else {
      pity[d.rarity] = remain - count;
    }

    d.remain = pity[d.rarity];
  });

  return pity;
}

// ===== 新增 =====
function addRecord(){
  let d = {
    start: startInput.value,
    end: endInput.value,
    role: roleInput.value,
    pool: poolInput.value,
    card: cardInput.value,
    rarity: rarityInput.value,
    event: eventInput.value,
    count: parseInt(countInput.value)
  };

  if(!d.count) return alert("請輸入抽數");

  data.push(d);
  save();
  render();
}

// ===== 顯示 =====
function render(){
  let pity = recalcAll();

  list.innerHTML = "";

  data.forEach((d,i)=>{
    list.innerHTML += `
      <tr>
        <td>${d.start} ~ ${d.end}</td>
        <td class="${getColor(d.role)}">${d.role}</td>
        <td>${d.pool}</td>
        <td>${d.card}</td>
        <td>${d.rarity}</td>
        <td>${d.count}</td>
        <td>${d.remain}</td>
        <td>
          <button onclick="edit(${i})">編輯</button>
          <button onclick="del(${i})">刪除</button>
        </td>
      </tr>
    `;
  });

  pityDisplay.innerHTML =
    `SSR剩餘：${pity.SSR} ｜ SSS剩餘：${pity.SSS}`;

  status.innerHTML =
    data.length === 0
    ? "🟢 全新紀錄（100保底）"
    : "🟡 已依所有紀錄自動重算保底";
}

// ===== 刪除 =====
function del(i){
  if(confirm("確定刪除？")){
    data.splice(i,1);
    save();
    render();
  }
}

// ===== 編輯 =====
function edit(i){
  let d = data[i];

  startInput.value = d.start;
  endInput.value = d.end;
  roleInput.value = d.role;
  poolInput.value = d.pool;
  cardInput.value = d.card;
  rarityInput.value = d.rarity;
  eventInput.value = d.event;
  countInput.value = d.count;

  data.splice(i,1);
  save();
  render();
}

// ===== 儲存 =====
function save(){
  localStorage.setItem("gachaData", JSON.stringify(data));
}

// ===== 重置 =====
function resetAll(){
  if(confirm("確定全部清除？")){
    localStorage.clear();
    location.reload();
  }
}

// ===== DOM =====
const startInput = document.getElementById("start");
const endInput = document.getElementById("end");
const roleInput = document.getElementById("role");
const poolInput = document.getElementById("pool");
const cardInput = document.getElementById("card");
const rarityInput = document.getElementById("rarity");
const eventInput = document.getElementById("event");
const countInput = document.getElementById("count");
const list = document.getElementById("list");
const pityDisplay = document.getElementById("pityDisplay");
const status = document.getElementById("status");

// ===== 啟動 =====
render();
</script>

</body>
</html>
