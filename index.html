<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>抽卡紀錄系統</title>

<style>
body {
  font-family: Arial;
  background: #F3E5F5;
  padding: 20px;
}

h2 {
  text-align: center;
}

input, select {
  margin: 5px;
  padding: 5px;
}

button {
  margin: 5px;
  padding: 6px 10px;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

/* 男主顏色 */
.夏彥 { color: #FFC107; font-weight: bold; }
.左然 { color: #F44336; font-weight: bold; }
.莫弈 { color: #4CAF50; font-weight: bold; }
.陸景和 { color: #CE93D8; font-weight: bold; }
</style>
</head>

<body>

<h2>🎴 抽卡紀錄</h2>

<!-- 輸入區 -->
<div>
  活動區間：
  <input type="date" id="startDate">
  ～ 
  <input type="date" id="endDate">

  <br>

  角色：
  <select id="character">
    <option>夏彥</option>
    <option>左然</option>
    <option>莫弈</option>
    <option>陸景和</option>
  </select>

  卡池名稱：
  <input type="text" id="pool">

  卡片名稱：
  <input type="text" id="card">

  卡面等級：
  <select id="rarity">
    <option>SSR</option>
    <option>SSS</option>
  </select>

  是否活動卡：
  <select id="isEvent">
    <option>是</option>
    <option>否</option>
  </select>

  已抽次數：
  <input type="number" id="draws">

  <button onclick="addRecord()">新增</button>
</div>

<!-- 表格 -->
<table>
  <thead>
    <tr>
      <th>活動區間</th>
      <th>角色</th>
      <th>卡池</th>
      <th>卡片</th>
      <th>等級</th>
      <th>活動卡</th>
      <th>已抽</th>
      <th>剩餘保底</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let records = JSON.parse(localStorage.getItem("gachaRecords")) || [];

let pity = {
  SSR: Number(localStorage.getItem("pitySSR")) || 0,
  SSS: Number(localStorage.getItem("pitySSS")) || 0
};

function saveData() {
  localStorage.setItem("gachaRecords", JSON.stringify(records));
  localStorage.setItem("pitySSR", pity.SSR);
  localStorage.setItem("pitySSS", pity.SSS);
}

function calculatePity(record) {
  let current = record.rarity === "SSR" ? pity.SSR : pity.SSS;

  let total = current + Number(record.draws);
  let remain = 100 - total;

  if (record.isEvent === "是") {
    pity[record.rarity] = 0;
  } else {
    pity[record.rarity] = total;
  }

  return remain < 0 ? 0 : remain;
}

function addRecord() {
  let start = document.getElementById("startDate").value;
  let end = document.getElementById("endDate").value;

  if (!start || !end) {
    alert("請選擇活動日期！");
    return;
  }

  if (new Date(start) > new Date(end)) {
    alert("開始日期不能大於結束日期！");
    return;
  }

  let record = {
    eventRange: start + " - " + end,
    character: document.getElementById("character").value,
    pool: document.getElementById("pool").value,
    card: document.getElementById("card").value,
    rarity: document.getElementById("rarity").value,
    isEvent: document.getElementById("isEvent").value,
    draws: document.getElementById("draws").value
  };

  record.remain = calculatePity(record);

  records.push(record);
  saveData();
  render();
}

function deleteRecord(index) {
  records.splice(index, 1);
  saveData();
  render();
}

function editRecord(index) {
  let r = records[index];

  let dates = r.eventRange.split("-");
  if (dates.length === 2) {
    document.getElementById("startDate").value = dates[0].trim();
    document.getElementById("endDate").value = dates[1].trim();
  }

  document.getElementById("character").value = r.character;
  document.getElementById("pool").value = r.pool;
  document.getElementById("card").value = r.card;
  document.getElementById("rarity").value = r.rarity;
  document.getElementById("isEvent").value = r.isEvent;
  document.getElementById("draws").value = r.draws;

  deleteRecord(index);
}

function render() {
  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  records.forEach((r, i) => {
    let row = `
      <tr>
        <td>${r.eventRange}</td>
        <td class="${r.character}">${r.character}</td>
        <td>${r.pool}</td>
        <td>${r.card}</td>
        <td>${r.rarity}</td>
        <td>${r.isEvent}</td>
        <td>${r.draws}</td>
        <td>${r.remain}</td>
        <td>
          <button onclick="editRecord(${i})">編輯</button>
          <button onclick="deleteRecord(${i})">刪除</button>
        </td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

/* 活動結束自動繼承 */
function autoCarryOver() {
  let today = new Date();

  records.forEach(r => {
    let dates = r.eventRange.split("-");
    if (dates.length === 2) {
      let endDate = new Date(dates[1].trim());

      if (today > endDate && !r.processed) {
        if (r.rarity === "SSR") {
          pity.SSR = 100 - r.remain;
        } else {
          pity.SSS = 100 - r.remain;
        }
        r.processed = true;
      }
    }
  });

  saveData();
}

autoCarryOver();
render();

</script>

</body>
</html>
